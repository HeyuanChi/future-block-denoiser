data:
  dataset_name: glue
  dataset_config: qqp
  tokenizer_name: facebook/bart-base
  task_mode: seq2seq
  train_split: train
  val_split: validation
  source_field: question1
  target_field: question2
  prefix_len: 32
  future_len: 32
  batch_size: 128
  num_workers: 8
  max_train_samples: null
  max_val_samples: null

model:
  bert_name: facebook/bart-base
  backbone_type: bart
  future_len: 32
  coarse_slots: 8
  latent_dim: 512
  decoder_latents: 32
  latent_bottleneck_depth: 2
  l2_normalize_latents: true
  slot_refinement: none
  freeze_backbone: true
  decoder_layers: 2
  decoder_heads: 8
  decoder_ffn_dim: 1024
  decoder_dropout: 0.1

training:
  learning_rate: 0.0003
  weight_decay: 0.0
  num_epochs: 50
  device: auto
  log_every: 100
  checkpoint_dir: outputs/checkpoints/ae_bart_latent_qqp
  log_dir: outputs/logs/ae_bart_latent_qqp
  save_every_epoch: false
  grad_clip_norm: 1.0
  warmup_ratio: 0.05
