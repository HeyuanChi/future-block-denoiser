data:
  dataset_name: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  tokenizer_name: bert-base-uncased
  prefix_len: 64
  future_len: 16
  stride: 16
  batch_size: 512
  num_workers: 8
  max_train_samples: null
  max_val_samples: null

model:
  bert_name: bert-base-uncased
  latent_dim: 256
  prefix_len: 64
  future_len: 16
  num_diffusion_steps: 4
  denoiser_layers: 4
  denoiser_heads: 8
  denoiser_ffn_dim: 1024
  denoiser_dropout: 0.1

training:
  ae_checkpoint_path: outputs/checkpoints/ae_best.pt
  denoiser_checkpoint_path: outputs/checkpoints/fixed4/denoiser_best.pt
  resume_from_checkpoint: null
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 100
  device: auto
  log_every: 100
  checkpoint_dir: outputs/checkpoints/fixed4
  log_dir: outputs/logs/fixed4
  save_every_epoch: true
