data:
  dataset_name: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  tokenizer_name: roberta-base
  prefix_len: 64
  future_len: 16
  stride: 16
  batch_size: 512
  num_workers: 8
  max_train_samples: null
  max_val_samples: null

model:
  bert_name: roberta-base
  prefix_len: 64
  future_len: 16
  coarse_slots: 4
  latent_dim: 256
  predictor_layers: 2
  predictor_heads: 8
  predictor_ffn_dim: 1024
  predictor_dropout: 0.1

training:
  ae_checkpoint_path: outputs/checkpoints/ae_four_slot_roberta_stable/ae_best.pt
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 100
  device: auto
  log_every: 100
  checkpoint_dir: outputs/checkpoints/four_slot_predictor_roberta
  log_dir: outputs/logs/four_slot_predictor_roberta
  save_every_epoch: false
  grad_clip_norm: 1.0
