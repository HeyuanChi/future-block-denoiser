data:
  dataset_name: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  tokenizer_name: roberta-base
  prefix_len: 64
  future_len: 16
  stride: 16
  batch_size: 512
  num_workers: 8
  max_train_samples: null
  max_val_samples: null

model:
  bert_name: roberta-base
  latent_dim: 256
  prefix_len: 64
  future_len: 16
  num_diffusion_steps: 2
  noise_schedule: sqrt
  timestep_sampling: loss_aware
  self_conditioning: true
  denoiser_layers: 4
  denoiser_heads: 8
  denoiser_ffn_dim: 1024
  denoiser_dropout: 0.1

training:
  ae_checkpoint_path: outputs/checkpoints/ae_best.pt
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 100
  device: auto
  log_every: 100
  checkpoint_dir: outputs/checkpoints/fixed2_roberta
  log_dir: outputs/logs/fixed2_roberta
  save_every_epoch: true
  grad_clip_norm: 1.0
  warmup_ratio: 0.05
