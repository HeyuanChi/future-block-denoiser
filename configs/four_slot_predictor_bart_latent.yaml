data:
  dataset_name: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  tokenizer_name: facebook/bart-base
  prefix_len: 64
  future_len: 16
  stride: 16
  batch_size: 256
  num_workers: 8
  max_train_samples: null
  max_val_samples: null

model:
  bert_name: facebook/bart-base
  backbone_type: bart
  prefix_len: 64
  future_len: 16
  coarse_slots: 8
  latent_dim: 512
  decoder_latents: 16
  latent_bottleneck_depth: 2
  l2_normalize_latents: true
  freeze_backbone: true
  slot_refinement: none
  predictor_layers: 2
  predictor_heads: 8
  predictor_ffn_dim: 2048
  predictor_dropout: 0.1

training:
  ae_checkpoint_path: outputs/checkpoints/ae_bart_latent/ae_best.pt
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 100
  device: auto
  log_every: 100
  checkpoint_dir: outputs/checkpoints/four_slot_predictor_bart_latent
  log_dir: outputs/logs/four_slot_predictor_bart_latent
  save_every_epoch: false
  grad_clip_norm: 1.0
  decode_loss_weight: 0.1
