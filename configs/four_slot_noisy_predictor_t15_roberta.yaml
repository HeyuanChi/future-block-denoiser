data:
  dataset_name: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  tokenizer_name: roberta-base
  prefix_len: 64
  future_len: 16
  stride: 16
  batch_size: 512
  num_workers: 8
  max_train_samples: null
  max_val_samples: null

model:
  bert_name: roberta-base
  prefix_len: 64
  future_len: 16
  coarse_slots: 4
  latent_dim: 256
  slot_refinement: causal_residual
  slot_refinement_layers: 1
  slot_refinement_scale: 0.25
  predictor_layers: 2
  predictor_heads: 8
  predictor_ffn_dim: 1024
  predictor_dropout: 0.1
  num_diffusion_steps: 50
  noise_schedule: sqrt

training:
  ae_checkpoint_path: outputs/checkpoints/ae_four_slot_causal_refine_roberta/ae_best.pt
  init_from_predictor_checkpoint: outputs/checkpoints/four_slot_predictor_causal_refine_roberta/predictor_best.pt
  noisy_target_timestep: 15
  learning_rate: 0.00005
  weight_decay: 0.0
  num_epochs: 30
  device: auto
  log_every: 100
  checkpoint_dir: outputs/checkpoints/four_slot_noisy_predictor_t15_roberta
  log_dir: outputs/logs/four_slot_noisy_predictor_t15_roberta
  save_every_epoch: false
  grad_clip_norm: 1.0

