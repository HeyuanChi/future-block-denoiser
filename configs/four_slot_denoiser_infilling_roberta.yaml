data:
  dataset_name: Salesforce/wikitext
  dataset_config: wikitext-2-raw-v1
  tokenizer_name: roberta-base
  task_mode: infilling
  prefix_len: 32
  future_len: 16
  suffix_len: 32
  stride: 16
  batch_size: 256
  num_workers: 8
  max_train_samples: null
  max_val_samples: null

model:
  bert_name: roberta-base
  latent_dim: 256
  prefix_len: 64
  future_len: 16
  coarse_slots: 4
  slot_refinement: causal_residual
  slot_refinement_layers: 1
  slot_refinement_scale: 0.25
  num_diffusion_steps: 50
  noise_schedule: sqrt
  timestep_sampling: loss_aware
  self_conditioning: true
  denoiser_layers: 4
  denoiser_heads: 8
  denoiser_ffn_dim: 1024
  denoiser_dropout: 0.1

training:
  ae_checkpoint_path: outputs/checkpoints/ae_four_slot_causal_refine_roberta/ae_best.pt
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 100
  device: auto
  log_every: 100
  checkpoint_dir: outputs/checkpoints/four_slot_denoiser_infilling_roberta
  log_dir: outputs/logs/four_slot_denoiser_infilling_roberta
  save_every_epoch: false
  grad_clip_norm: 1.0
  warmup_ratio: 0.05
